app            = "faceless-spectre"
primary_region = "ord"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  PORT     = "2567"
  NODE_ENV = "production"

[http_service]
  internal_port        = 2567
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 400
    soft_limit = 300

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/health"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
